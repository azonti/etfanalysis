name: Update data

on:
  schedule:
  - cron: '0 0 * * 0'
    timezone: 'Asia/Tokyo'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'update-data'
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Install dependencies
      run: bun install

    - name: Run retriever.ts
      run: PUPPETEER_DANGEROUS_NO_SANDBOX=true bun retriever.ts

    - name: Run workaroundApplier.ts
      run: bun workaroundApplier.ts

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "28558912+github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "update data" || echo "No changes to commit"
        git push
